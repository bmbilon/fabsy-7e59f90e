name: Prerender refresh
on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'
  push:
    branches: [ main ]
    paths-ignore:
      - 'public/prerendered/**'
      - 'prerendered/**'
concurrency:
  group: prerender-${{ github.ref }}
  cancel-in-progress: true
jobs:
  prerender:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: Sync pages from Supabase (guarded)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          [ -z "$SUPABASE_URL" ] && { echo "no secrets; skip"; exit 0; }
          node scripts/sync-pages-from-db.js
      - run: node scripts/generate-routes.js
      - run: node ci/validate-faq-jsonld.js
      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          VITE_GA4_MEASUREMENT_ID: ${{ secrets.VITE_GA4_MEASUREMENT_ID }}
          VITE_GADS_ID: ${{ secrets.VITE_GADS_ID }}
          VITE_GADS_CONVERSION_LABEL: ${{ secrets.VITE_GADS_CONVERSION_LABEL }}
          VITE_GADS_PURCHASE_LABEL: ${{ secrets.VITE_GADS_PURCHASE_LABEL }}
        run: npm run build
      - run: npx playwright install --with-deps chromium
      - name: Serve dist
        run: nohup npx serve -s dist -l 4173 >/dev/null 2>&1 & sleep 3
      - name: Prerender to static HTML
        env:
          PRERENDER_BASE_URL: http://127.0.0.1:4173
          PRERENDER_OUT_DIR: public/prerendered
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: node scripts/prerender-all.js
      - name: Commit refreshed snapshots
        run: |
          git config user.name  "fabsy-ci"
          git config user.email "ci@fabsy.ca"
          git add public/prerendered prerendered || true
          git commit -m "ci: refresh prerendered snapshots [skip ci]" || echo "no changes"
          git push || echo "nothing to push"
